# PostgreSQL 18 configuration
# Target: 16GB RAM / 8 CPU, balanced regular read/write
# Corpus: ~38M documents, ~84GB cleaned text in TOAST

# --- Connections ---
listen_addresses = '*'             # accept connections from Docker host

# --- Memory ---
shared_buffers = 4GB               # 25% of RAM; rest for OS page cache (TOAST reads benefit)
effective_cache_size = 12GB        # planner hint: OS + PG buffer cache combined
work_mem = 64MB                    # per-sort/hash op; safe at 64MB x 4 parallel workers on 16GB
maintenance_work_mem = 2GB         # index builds, VACUUM, ALTER TABLE
huge_pages = try

# --- Connections & Workers ---
max_connections = 30
max_worker_processes = 16
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# --- WAL ---
wal_buffers = 64MB
wal_compression = zstd             # PG17+ supports zstd; reduces WAL I/O by ~40%
wal_level = replica                # keeps point-in-time recovery available
synchronous_commit = off           # async commit: safe for corpus (rebuildable from R2 parquets)
checkpoint_timeout = 15min         # balanced for R/W (ingest-only would use 30min)
max_wal_size = 16GB
min_wal_size = 1GB

# --- Planner (NVMe SSD biased) ---
random_page_cost = 1.1             # NVMe: nearly as cheap as sequential
effective_io_concurrency = 200     # NVMe: supports many concurrent I/Os
seq_page_cost = 1.0

# --- Autovacuum ---
autovacuum = on
autovacuum_max_workers = 4
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_scale_factor = 0.01   # vacuum at 1% dead tuples (suits heavy-write tables)
autovacuum_analyze_scale_factor = 0.005

# --- Query Tuning ---
jit = on
compute_query_id = on              # required for pg_stat_statements query correlation
enable_partitionwise_join = on     # push joins into partitions (unified_document_texts)
enable_partitionwise_aggregate = on

# --- Logging ---
log_min_duration_statement = 1000  # log queries slower than 1s
log_parameter_max_length = 256     # avoid multi-GB Docker logs from bulk insert parameter dumps
log_checkpoints = on
log_autovacuum_min_duration = 250ms
log_line_prefix = '%t [%p] %u@%d '
