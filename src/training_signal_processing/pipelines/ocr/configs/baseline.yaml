# Baseline OCR experiment config.
#
# Run as-is:
#   uv run python -m training_signal_processing.main run \
#     --config src/training_signal_processing/pipelines/ocr/configs/baseline.yaml
#
# Layer an experiment overlay on top (later --config wins on conflict, deep-merged):
#   uv run python -m training_signal_processing.main run \
#     --config src/training_signal_processing/pipelines/ocr/configs/baseline.yaml \
#     --config src/training_signal_processing/pipelines/ocr/configs/experiment.example.yaml
#
# Guardrail: do NOT commit ssh.host or ssh.port in any overlay file in this
# directory. Each operator's SSH target is resolved per-machine from the
# gitignored `infra/current-machine` file. Hardcoded SSH targets in overlays
# would break collaborators.

run:
  name: marker-ocr-baseline
  config_version: 1

ssh:
  host: 74.15.1.150
  port: 30311
  user: root
  identity_file: ~/.ssh/id_ed25519

remote:
  root_dir: /root/training-signal-processing
  python_version: "3.12"

ray:
  executor_type: ray
  batch_size: 1
  concurrency: 8
  target_num_blocks: 9670
  marker_ocr_resources:
    num_gpus: 0.5
    num_cpus: 3
  async_upload:
    enabled: true
    max_in_flight: 8
    max_queued: 32

r2:
  config_file: r2
  bucket: gpu-poor
  output_prefix: dataset/processed/pdf_ocr

input:
  local_pdf_root: /home/geeyang/workspace/malay-data/bookscrape/data/downloads
  raw_pdf_prefix: dataset/raw/pdf
  include_glob: "**/*.pdf"

mlflow:
  enabled: true
  local_tracking_uri: http://127.0.0.1:5000
  remote_tunnel_port: 15000
  experiment_name: remote-pdf-ocr

observability:
  flush_interval_sec: 5
  log_per_file_events: true
  heartbeat_interval_sec: 10

resumability:
  strategy: batch_manifest
  commit_every_batches: 1
  resume_mode: latest

ops:
  - name: prepare_pdf_document
    type: mapper
  - name: skip_existing
    type: filter
  - name: marker_ocr
    type: mapper
    force_ocr: true
  - name: export_markdown
    type: mapper
