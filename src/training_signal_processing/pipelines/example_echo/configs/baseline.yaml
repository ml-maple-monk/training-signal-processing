# Baseline example_echo recipe.
#
# This pipeline takes a list of items declared inline, appends a UTC timestamp
# to each, and writes one JSON blob per item to R2. It's the minimal shape that
# satisfies the framework contract — use it as a template for new pipelines.
#
# Run (after pre-reqs from ONBOARDING.md §0):
#   uv run --group remote_ocr python -m training_signal_processing.pipelines.example_echo.cli validate \
#     --config src/training_signal_processing/pipelines/example_echo/configs/baseline.yaml
#
# Guardrail: do NOT commit ssh.host or ssh.port in an overlay file under this
# directory. Those get resolved per-machine from the gitignored
# infra/current-machine (see ONBOARDING.md §1.2).

run:
  name: example-echo-baseline
  config_version: 1

ssh:
  host: 74.15.1.150
  port: 30311
  user: root
  identity_file: ~/.ssh/id_ed25519

remote:
  root_dir: /root/training-signal-processing
  python_version: "3.12"

ray:
  executor_type: ray
  batch_size: 2
  concurrency: 1
  target_num_blocks: 1

r2:
  config_file: r2
  bucket: gpu-poor
  output_prefix: dataset/processed/example_echo

input:
  items:
    - source_id: alpha
      message: hello from alpha
    - source_id: beta
      message: hello from beta
    - source_id: gamma
      message: hello from gamma

mlflow:
  enabled: false
  tracking_uri: ""
  experiment_name: example-echo

observability:
  flush_interval_sec: 5
  log_per_file_events: true
  heartbeat_interval_sec: 10

resumability:
  strategy: batch_manifest
  commit_every_batches: 1
  resume_mode: latest

ops:
  - name: prepare_echo
    type: mapper
  - name: timestamp_echo
    type: mapper
  - name: export_echo
    type: mapper
