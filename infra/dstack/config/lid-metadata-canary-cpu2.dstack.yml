# doc-anchor: dstack-lid-metadata-canary-cpu32-yaml
type: task
name: tsp-lid-canary-cpu32

image: ${LID_METADATA_IMAGE}
registry_auth:
  username: ${VCR_USERNAME}
  password: ${VCR_PASSWORD}

env:
  - LID_METADATA_IMAGE
  - VCR_USERNAME
  - VCR_PASSWORD
  - R2_BUCKET
  - R2_ACCESS_KEY_ID
  - R2_SECRET_ACCESS_KEY
  - R2_REGION
  - R2_ENDPOINT_URL
  - LID_METADATA_CANARY_ONLY=1
  - RAY_CLUSTER_WAIT_SECONDS=600

commands:
  - >-
    timeout 300 bash -lc 'uv run --no-sync --group lid_metadata python -m
    training_signal_processing.main lid-metadata-validate --config
    /app/config/lid_metadata.sample.yaml --set ray.concurrency=32 --set
    ray.target_num_blocks=1024 && uv run --no-sync --group lid_metadata python
    -c "from training_signal_processing.pipelines.lid_metadata.ops import
    build_lingua_detector; build_lingua_detector(); print(\"canary ok\",
    flush=True)"'

backends: [verda]
regions: [FIN-03]
instance_types: [CPU.32V.128G]
resources:
  cpu: 32..
  memory: 128GB..
  disk: 200GB..

spot_policy: on-demand
max_duration: 1h
idle_duration: 0s

retry:
  on_events:
    - no-capacity
    - interruption
  duration: 30m
