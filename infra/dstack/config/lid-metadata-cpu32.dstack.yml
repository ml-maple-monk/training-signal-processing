# doc-anchor: dstack-lid-metadata-cpu32-yaml
type: task
name: tsp-lid-cpu32

image: ${LID_METADATA_IMAGE}
registry_auth:
  username: ${VCR_USERNAME}
  password: ${VCR_PASSWORD}

env:
  - LID_METADATA_IMAGE
  - VCR_USERNAME
  - VCR_PASSWORD
  - R2_BUCKET
  - R2_ACCESS_KEY_ID
  - R2_SECRET_ACCESS_KEY
  - R2_REGION
  - R2_ENDPOINT_URL
  - LID_METADATA_RUN_ID
  - LID_METADATA_CONFIG_OBJECT_KEY
  - LID_METADATA_INPUT_MANIFEST_KEY
  - LID_METADATA_UPLOADED_ITEMS
  - RAY_CLUSTER_WAIT_SECONDS=900

commands:
  - bash /app/infra/dstack/scripts/run-lid-metadata-ray.sh

backends: [verda]
regions: [FIN-03]
instance_types: [CPU.32V.128G]
resources:
  cpu: 32..
  memory: 128GB..
  disk: 200GB..

spot_policy: on-demand
max_duration: 24h
idle_duration: 0s

retry:
  on_events:
    - no-capacity
    - interruption
  duration: 2h
