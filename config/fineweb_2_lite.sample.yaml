run:
  name: fineweb2-lite

database:
  dsn_env_var: DATABASE_URL
  fallback_dsn: postgresql://corpus:corpus_secret@localhost:5432/corpus

input:
  batch_size: 1000
  min_text_length: 0
  include_unified: true
  include_sea_pile_malay: false

processing:
  write_batch_size: 1000
  worker_count: 8

language_resolution:
  source_defaults:
    books-ocr: zsm_Latn
    lowyat: zsm_Latn
    cari: zsm_Latn
    reddit-bolehland: zsm_Latn
    hplt-malay: zsm_Latn
    sea-pile-malay: zsm_Latn
    reddit-indonesia: ind_Latn
    hplt-indonesia: ind_Latn

language_profiles:
  ind_Latn:
    language_score: 0.685
    dup_line_frac: 0.241
    top_n_grams:
      2: 0.194
      3: 0.166
      4: 0.145
    dup_n_grams:
      5: 0.166
      6: 0.155
      7: 0.144
      8: 0.133
      9: 0.122
      10: 0.111
    line_punct_thr: 0.111
    new_line_ratio: 0.157
    min_avg_word_length: 3
    max_avg_word_length: 12
    max_non_alpha_words_ratio: 0.805
    stopwords:
      - dan
      - yang
      - di
      - pada
      - dari
      - ini
      - dengan
      - adalah
      - untuk
      - dalam

  zsm_Latn:
    language_score: 0.618
    dup_line_frac: 0.331
    top_n_grams:
      2: 0.264
      3: 0.252
      4: 0.225
    dup_n_grams:
      5: 0.185
      6: 0.176
      7: 0.166
      8: 0.156
      9: 0.145
      10: 0.134
    line_punct_thr: 0.125
    new_line_ratio: 0.214
    min_avg_word_length: 3
    max_avg_word_length: 11
    max_non_alpha_words_ratio: 0.808
    stopwords:
      - dan
      - di
      - yang
      - pada
      - dalam
      - dengan
      - untuk
      - ini
