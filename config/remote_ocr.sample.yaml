run:
  name: marker-ocr-stream
  config_version: 1

ssh:
  host: 74.15.1.150
  port: 30311
  user: root
  identity_file: ~/.ssh/id_ed25519

remote:
  root_dir: /root/training-signal-processing
  python_version: "3.12"
  remote_jobs_root: /root/ocr-jobs
  pgid_wait_attempts: 20
  pgid_wait_sleep_seconds: 0.25
  sync_paths:
    - pyproject.toml
    - uv.lock
    - src
    - config

ray:
  executor_type: ray
  batch_size: 1
  concurrency: 2
  target_num_blocks: 32
  marker_ocr_resources:
    num_gpus: 0.5
    num_cpus: 3

r2:
  config_file: r2
  bucket: gpu-poor
  output_prefix: dataset/processed/pdf_ocr

input:
  local_pdf_root: /home/geeyang/workspace/malay-data/bookscrape/data/downloads
  raw_pdf_prefix: dataset/raw/pdf
  include_glob: "**/*.pdf"
  upload_transfers: 1
  upload_checkers: 1
  max_files: 5

mlflow:
  enabled: false
  tracking_uri: ""
  experiment_name: remote-pdf-ocr

observability:
  flush_interval_sec: 5
  log_per_file_events: true
  heartbeat_interval_sec: 10

resumability:
  strategy: batch_manifest
  commit_every_batches: 1
  resume_mode: latest

ops:
  - name: prepare_pdf_document
    type: mapper
  - name: skip_existing
    type: filter
  - name: marker_ocr
    type: mapper
    force_ocr: true
    timeout_sec: 1800
    source_object_poll_interval_sec: 2.0
