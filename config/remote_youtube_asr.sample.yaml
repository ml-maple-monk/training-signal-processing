run:
  name: youtube-asr-stream
  config_version: 1

ssh:
  host: 74.15.1.150
  port: 30311
  user: root
  identity_file: ~/.ssh/id_ed25519

remote:
  root_dir: /root/training-signal-processing
  python_version: "3.12"

ray:
  executor_type: ray
  batch_size: 1
  concurrency: 1
  target_num_blocks: 32

r2:
  config_file: r2
  bucket: gpu-poor
  output_prefix: dataset/processed/youtube_asr

input:
  channel_urls_path: config/youtube_channels.sample.txt
  videos_per_channel: 5000
  media_r2_prefix: dataset/raw/youtube_media

download:
  local_staging_dir: ~/.cache/training-signal-processing/youtube_asr
  format_selector: bestaudio/best
  cookies_file: ""
  cookies_from_browser: ""

asr:
  model_name: Qwen/Qwen3-ASR-0.6B
  gpu_memory_utilization: 0.7
  max_inference_batch_size: 8
  max_new_tokens: 2048
  max_media_file_size_mb: 512
  language: ""

mlflow:
  enabled: false
  tracking_uri: ""
  experiment_name: remote-youtube-asr

observability:
  flush_interval_sec: 5
  log_per_file_events: true
  heartbeat_interval_sec: 10

resumability:
  strategy: batch_manifest
  commit_every_batches: 1
  resume_mode: latest

ops:
  - name: prepare_youtube_media
    type: mapper
  - name: skip_existing_youtube_media
    type: filter
  - name: qwen3_asr_vllm
    type: mapper
  - name: export_youtube_transcript
    type: mapper
