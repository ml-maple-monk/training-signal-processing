run:
  name: qwen-tokenizer-stream
  config_version: 1

ssh:
  host: 74.15.1.150
  port: 30311
  user: root
  identity_file: ~/.ssh/id_ed25519

remote:
  root_dir: /root/training-signal-processing
  python_version: "3.12"

ray:
  executor_type: ray
  batch_size: 1
  concurrency: 1
  target_num_blocks: 32

r2:
  config_file: r2
  bucket: gpu-poor
  output_prefix: dataset/processed/tokenizer

input:
  source_prefix: dataset/raw
  family_specs:
    - name: books
      glob: books/*.parquet
      text_column: markdown_text
      id_columns: [book_id, markdown_sha256, source_pdf_rel_path, markdown_rel_path]
    - name: local_ztd
      glob: local_ztd/*/selection_bucket=*/*.parquet
      text_column: text
      id_columns: [source_doc_id, source_locator]
    - name: seapile_v2
      glob: seapile_v2/*/selection_bucket=*/*.parquet
      text_column: text
      id_columns: [source_doc_id, source_locator]
    - name: subtitle
      glob: subtitle/*.parquet
      text_column: subtitle_text
      id_columns: [subtitle_id, subtitle_text_sha256, source_rel_path]
    - name: zhihu_article
      glob: zhihu_article/*.parquet
      text_column: content
      id_columns: [id, url]
    - name: zhihu_qa
      glob: zhihu_qa/*.parquet
      text_column: answer_content
      id_columns: [answer_id, question_id]

tokenizer:
  model_name: Qwen/Qwen3-0.6B
  output_compression: gzip

mlflow:
  enabled: true
  local_tracking_uri: http://127.0.0.1:5000
  remote_tunnel_port: 15000
  experiment_name: remote-tokenizer

observability:
  flush_interval_sec: 5
  log_per_file_events: true
  heartbeat_interval_sec: 10

resumability:
  strategy: batch_manifest
  commit_every_batches: 1
  resume_mode: latest

ops:
  - name: prepare_parquet_shard
    type: mapper
  - name: skip_existing_shards
    type: filter
  - name: tokenize_hf_token_ids
    type: mapper
  - name: export_token_jsonl
    type: mapper
